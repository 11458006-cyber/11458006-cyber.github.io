<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">工程計算機縮圖</title>
  <desc id="desc">工程與函數計算機作品預覽縮圖</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#142b44"/>
      <stop offset="55%" stop-color="#1f5c97"/>
      <stop offset="100%" stop-color="#5ab1ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfefe"/>
      <stop offset="100%" stop-color="#e8f1ff"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1150" cy="80" r="180" fill="#8fd0ff" opacity="0.25"/>
  <circle cx="140" cy="640" r="220" fill="#ffb58d" opacity="0.2"/>

  <rect x="125" y="90" width="1030" height="540" rx="34" fill="#ffffff" opacity="0.16"/>
  <rect x="180" y="145" width="920" height="430" rx="26" fill="url(#panel)" stroke="#b6cbe6" stroke-width="3"/>

  <rect x="225" y="185" width="830" height="84" rx="14" fill="#ffffff" stroke="#cad8ea" stroke-width="2"/>
  <text x="1020" y="239" text-anchor="end" font-family="'IBM Plex Mono', 'Consolas', monospace" font-size="48" fill="#0f3252">sin(45)+12^2</text>

  <g font-family="'Segoe UI', 'Noto Sans TC', sans-serif" font-weight="700" font-size="30" text-anchor="middle">
    <rect x="225" y="300" width="152" height="70" rx="12" fill="#ffe9e4"/>
    <text x="301" y="344" fill="#a2402d">AC</text>

    <rect x="395" y="300" width="152" height="70" rx="12" fill="#eef7ea"/>
    <text x="471" y="344" fill="#1c5b2f">sin</text>

    <rect x="565" y="300" width="152" height="70" rx="12" fill="#eef7ea"/>
    <text x="641" y="344" fill="#1c5b2f">cos</text>

    <rect x="735" y="300" width="152" height="70" rx="12" fill="#eef7ea"/>
    <text x="811" y="344" fill="#1c5b2f">sqrt</text>

    <rect x="905" y="300" width="152" height="70" rx="12" fill="#eaf2ff"/>
    <text x="981" y="344" fill="#134786">x^y</text>

    <rect x="225" y="388" width="152" height="70" rx="12" fill="#ffffff" stroke="#c4d4e8" stroke-width="2"/>
    <text x="301" y="432" fill="#163452">7</text>

    <rect x="395" y="388" width="152" height="70" rx="12" fill="#ffffff" stroke="#c4d4e8" stroke-width="2"/>
