    <text x="641" y="432" fill="#163452">9</text>

    <rect x="735" y="388" width="152" height="70" rx="12" fill="#eaf2ff"/>
    <text x="811" y="432" fill="#134786">÷</text>

    <rect x="905" y="388" width="152" height="158" rx="12" fill="#1d7aef"/>
    <text x="981" y="482" fill="#ffffff" font-size="52">=</text>
  </g>

  <text x="220" y="545" font-family="'Segoe UI', 'Noto Sans TC', sans-serif" font-size="44" font-weight="800" fill="#123b60">Engineering + Scientific Calculator</text>
