<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>前端作品集 | 劉米</title>
  <style>
    :root {
      --bg-1: #fef7e8;
      --bg-2: #f5e0b9;
      --card: rgba(255, 251, 242, 0.82);
      --ink: #2f261d;
      --muted: #73553a;
      --line: rgba(105, 75, 41, 0.22);
      --accent: #cd6120;
      --accent-2: #ef945f;
      --shadow: rgba(61, 40, 16, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(1200px 600px at -20% -10%, rgba(255, 255, 255, 0.82), transparent 55%),
        radial-gradient(900px 500px at 120% 120%, rgba(255, 255, 255, 0.34), transparent 60%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      padding: 20px 12px 36px;
    }

    .shell {
      width: min(1080px, 100%);
      margin: 0 auto;
    }

    .hero {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      box-shadow: 0 22px 36px var(--shadow);
      padding: 22px;
      margin-bottom: 18px;
    }

    .badge {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.11em;
      color: #7d4a20;
      background: rgba(205, 97, 32, 0.14);
      border-radius: 999px;
      padding: 7px 12px;
    }

    h1 {
      margin: 12px 0 10px;
      font-size: clamp(2rem, 4.2vw, 3.3rem);
      line-height: 1;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .author {
      margin-top: 10px;
      font-weight: 800;
      color: #7b4d29;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .project {
      display: flex;
      flex-direction: column;
      background: var(--card);
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      overflow: hidden;
      box-shadow: 0 18px 30px var(--shadow);
    }

    .thumb-wrap {
      position: relative;
      display: block;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      background: #f2debe;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    .project:hover .thumb-wrap img {
      transform: scale(1.03);
      filter: saturate(1.06);
    }

    .meta {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .meta h2 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.2;
    }

    .meta p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      font-weight: 800;
      font-size: 0.92rem;
      border-radius: 999px;
      padding: 10px 14px;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .btn.primary {
      color: #fff;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      box-shadow: 0 10px 18px rgba(146, 72, 27, 0.24);
    }

    .btn.ghost {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
    }

    .footer {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #6e5037;
      text-align: center;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .project {
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div class="badge">PORTFOLIO</div>
      <h1>我的遊戲作品集</h1>
      <p>這裡收錄兩個純 HTML/JavaScript 小遊戲作品，每個作品都附上縮圖預覽，點進去可直接遊玩。</p>
      <div class="author">作者名稱:劉米</div>
    </header>

    <section class="grid" aria-label="作品清單">
      <article class="project">
        <a class="thumb-wrap" href="w.html" aria-label="前往打地鼠作品">
          <img src="assets/thumbnails/whack-thumb.svg" alt="打地鼠作品縮圖">
        </a>
        <div class="meta">
          <h2>打地鼠</h2>
          <p>30 秒挑戰模式，支援滑鼠與觸控，含分數、命中率與最高分記錄。</p>
          <div class="actions">
            <a class="btn primary" href="w.html">開始遊玩</a>
          </div>
        </div>
      </article>

      <article class="project">
        <a class="thumb-wrap" href="s.html" aria-label="前往貪食蛇作品">
          <img src="assets/thumbnails/snake-thumb.svg" alt="貪食蛇作品縮圖">
        </a>
        <div class="meta">
          <h2>貪食蛇</h2>
          <p>支援鍵盤、手機滑動與虛擬方向鍵，分數越高速度越快，含最高分保存。</p>
          <div class="actions">
            <a class="btn primary" href="s.html">開始遊玩</a>
          </div>
        </div>
      </article>
    </section>

    <p class="footer">2026 Frontend Arcade Portfolio</p>
  </main>
</body>
</html>
