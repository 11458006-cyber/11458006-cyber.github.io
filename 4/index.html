<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini 聊天頁面</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap');

    :root {
      --bg-0: #f2f7ff;
      --bg-1: #dbe9ff;
      --ink: #0f2742;
      --muted: #49607a;
      --line: rgba(24, 52, 90, 0.18);
      --panel: rgba(255, 255, 255, 0.88);
      --user: #0f6dff;
      --model: #ffffff;
      --model-line: rgba(33, 69, 115, 0.2);
      --danger: #b13f34;
      --ok: #0f8c65;
      --accent: #ff6a3d;
      --shadow: 0 18px 42px rgba(15, 39, 66, 0.16);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 10%, #ffffff 0%, rgba(255, 255, 255, 0) 34%),
        radial-gradient(circle at 90% 14%, #bfd7ff 0%, rgba(191, 215, 255, 0) 34%),
        linear-gradient(130deg, var(--bg-0), var(--bg-1));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .glow {
      position: fixed;
      width: 260px;
      height: 260px;
      border-radius: 999px;
      filter: blur(26px);
      opacity: 0.6;
      z-index: -1;
      pointer-events: none;
      animation: drift 11s ease-in-out infinite;
    }

    .glow.a {
      background: #a8d4ff;
      top: -80px;
      right: -60px;
    }

    .glow.b {
      background: #ffd4bf;
      bottom: -90px;
      left: -50px;
      animation-delay: -4s;
    }

    .app {
      width: min(1040px, 100%);
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
      animation: rise 0.6s ease;
    }

    .side,
    .chat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(6px);
      box-shadow: var(--shadow);
    }

    .side {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .brand {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: 0.02em;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #1d446f;
      font-size: 0.88rem;
      font-weight: 700;
    }

    input,
    select,
    button,
    textarea {
      width: 100%;
      font: inherit;
      border-radius: 12px;
    }

    input,
    select,
    textarea {
      border: 1px solid #bfd0e7;
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
    }

    input:focus,
    select:focus,
    textarea:focus,
    button:focus {
      outline: 2px solid rgba(15, 109, 255, 0.24);
      outline-offset: 1px;
    }

    .key-note {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.4;
    }

    .btn {
      border: none;
      cursor: pointer;
      color: #fff;
      padding: 10px 12px;
      font-weight: 700;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn.primary {
      background: linear-gradient(90deg, #0f6dff, #0a8cf0);
      box-shadow: 0 10px 20px rgba(15, 109, 255, 0.26);
    }

    .btn.warn {
      background: linear-gradient(90deg, #f26a45, #ff9058);
      box-shadow: 0 10px 20px rgba(242, 106, 69, 0.24);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 0.87rem;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.err {
      color: var(--danger);
    }

    .chat {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 74vh;
      overflow: hidden;
    }

    .top {
      border-bottom: 1px solid var(--line);
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .top h2 {
      margin: 0;
      font-size: 1.04rem;
    }

    .top .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: #164a7e;
      background: #e9f2ff;
      border: 1px solid #bdd2ef;
      border-radius: 999px;
      padding: 4px 9px;
      white-space: nowrap;
    }

    .messages {
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: min(760px, 92%);
      border-radius: 16px;
      padding: 12px 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border: 1px solid transparent;
      transform: translateY(6px);
      opacity: 0;
      animation: show 0.25s ease forwards;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .msg.model {
      align-self: flex-start;
      background: var(--model);
      color: var(--ink);
      border: 1px solid var(--model-line);
      border-bottom-left-radius: 5px;
    }

    .msg.system {
      align-self: center;
      background: #edf4ff;
      color: #214f84;
      border: 1px dashed #b4cae7;
      font-size: 0.9rem;
      max-width: 100%;
      text-align: center;
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.5;
    }

    .composer-row {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 10px;
      align-items: center;
    }

    .counter {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .footer-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.4;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes show {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes drift {
      0%, 100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(16px, -14px);
      }
    }

    @media (max-width: 940px) {
      .app {
        grid-template-columns: 1fr;
      }

      .chat {
        min-height: 68vh;
      }
    }

    @media (max-width: 620px) {
      body {
        padding: 12px;
      }

      .side,
      .chat {
        border-radius: 15px;
      }

      .row,
      .composer-row {
        grid-template-columns: 1fr;
      }

      .messages {
        padding: 12px;
      }

      .composer {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="glow a"></div>
  <div class="glow b"></div>

  <main class="app">
    <aside class="side">
      <h1 class="brand">Gemini Chat</h1>
      <p class="sub">類似 ChatGPT 的對話介面。輸入 API Key 後即可直接呼叫 Gemini 回應。</p>

      <section>
        <label for="apiKey">Gemini API Key</label>
        <input id="apiKey" type="password" placeholder="貼上你的 API Key">
        <p class="key-note">只保存在此頁面記憶體，不會寫入檔案或自動上傳。</p>
      </section>

      <section>
        <label for="modelSelect">模型</label>
        <select id="modelSelect">
          <option value="gemini-2.0-flash" selected>gemini-2.0-flash</option>
          <option value="gemini-2.5-flash">gemini-2.5-flash</option>
          <option value="gemini-1.5-flash">gemini-1.5-flash</option>
        </select>
      </section>

      <div class="row">
        <button id="saveKeyBtn" class="btn primary" type="button">暫存金鑰</button>
        <button id="clearChatBtn" class="btn warn" type="button">清除對話</button>
      </div>

      <div id="status" class="status">尚未設定 API Key</div>
      <p class="footer-note">提示：若呼叫失敗，請檢查 API Key、模型名稱，或該金鑰是否啟用 Gemini API。</p>
    </aside>

    <section class="chat">
      <header class="top">
        <h2>聊天視窗</h2>
        <span id="modelTag" class="tag">gemini-2.0-flash</span>
      </header>

      <div id="messages" class="messages" aria-live="polite"></div>

      <div class="composer">
        <textarea id="promptInput" placeholder="輸入你的問題，按 Enter 送出（Shift+Enter 換行）"></textarea>
        <div class="composer-row">
          <div id="counter" class="counter">0 字元</div>
          <button id="sendBtn" class="btn primary" type="button">送出訊息</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const apiKeyInput = document.getElementById('apiKey');
    const modelSelect = document.getElementById('modelSelect');
    const modelTag = document.getElementById('modelTag');
    const statusBox = document.getElementById('status');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const messagesEl = document.getElementById('messages');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const counter = document.getElementById('counter');

    let apiKey = '';
    let busy = false;

    const chatHistory = [];

    function setStatus(message, type = '') {
      statusBox.textContent = message;
      statusBox.classList.remove('ok', 'err');
      if (type) {
        statusBox.classList.add(type);
      }
    }

    function setBusy(value) {
      busy = value;
      sendBtn.disabled = value;
      sendBtn.textContent = value ? '回應中...' : '送出訊息';
      modelSelect.disabled = value;
      saveKeyBtn.disabled = value;
      clearChatBtn.disabled = value;
    }

    function addMessage(role, text) {
      const node = document.createElement('article');
      node.className = 'msg ' + role;
      node.textContent = text;
      messagesEl.appendChild(node);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return node;
    }

    function updateCounter() {
      counter.textContent = `${promptInput.value.length} 字元`;
    }

    function extractGeminiText(data) {
      const candidate = data && data.candidates && data.candidates[0];
      if (!candidate || !candidate.content || !Array.isArray(candidate.content.parts)) {
        return '';
      }

      return candidate.content.parts
        .map((part) => part.text || '')
        .join('')
        .trim();
    }

    async function sendMessage() {
      if (busy) return;

      const prompt = promptInput.value.trim();
      if (!apiKey) {
        setStatus('請先輸入並暫存 API Key。', 'err');
        return;
      }

      if (!prompt) {
        setStatus('請輸入訊息內容。', 'err');
        return;
      }

      const model = modelSelect.value;
      modelTag.textContent = model;

      addMessage('user', prompt);
      chatHistory.push({
        role: 'user',
        parts: [{ text: prompt }]
      });

      promptInput.value = '';
      updateCounter();
      setStatus('正在向 Gemini 請求回應...');
      setBusy(true);

      const typingNode = addMessage('model', '正在思考中...');

      try {
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(apiKey)}`;
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            contents: chatHistory,
            generationConfig: {
              temperature: 0.7,
              topP: 0.9,
              maxOutputTokens: 1024
            }
          })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          const message = (data && data.error && data.error.message) ? data.error.message : `HTTP ${response.status}`;
          throw new Error(message);
        }

        const reply = extractGeminiText(data);
        if (!reply) {
          throw new Error('模型回應為空，請稍後再試。');
        }

        typingNode.textContent = reply;
        chatHistory.push({
          role: 'model',
          parts: [{ text: reply }]
        });

        setStatus('回應成功。', 'ok');
      } catch (error) {
        typingNode.textContent = `呼叫失敗：${error.message}`;
        typingNode.classList.add('system');
        setStatus('發生錯誤，請檢查 API 設定或網路。', 'err');
      } finally {
        setBusy(false);
      }
    }

    saveKeyBtn.addEventListener('click', () => {
      const nextKey = apiKeyInput.value.trim();
      if (!nextKey) {
        apiKey = '';
        setStatus('尚未設定 API Key', 'err');
        return;
      }

      apiKey = nextKey;
      setStatus('API Key 已暫存，可以開始聊天。', 'ok');
    });

    clearChatBtn.addEventListener('click', () => {
      chatHistory.length = 0;
      messagesEl.innerHTML = '';
      addMessage('system', '對話已清除，請輸入新問題。');
      setStatus(apiKey ? '已清除對話。' : '尚未設定 API Key');
    });

    sendBtn.addEventListener('click', sendMessage);

    promptInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    promptInput.addEventListener('input', updateCounter);

    modelSelect.addEventListener('change', () => {
      modelTag.textContent = modelSelect.value;
    });

    addMessage('system', '歡迎使用 Gemini Chat。請先在左側輸入 API Key 並按「暫存金鑰」。');
    updateCounter();
  </script>
</body>
</html>
